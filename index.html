<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Su Nadi Win! 👑</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #09070f;
            font-family: 'Outfit', sans-serif;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated Glowing Background Plasma */
        body::before {
            content: '';
            position: absolute;
            width: 150%;
            height: 150%;
            background: radial-gradient(circle at 30% 30%, #4a154b 0%, transparent 40%),
                        radial-gradient(circle at 70% 80%, #11224d 0%, transparent 50%),
                        radial-gradient(circle at 50% 50%, #ff007f 0%, transparent 60%);
            opacity: 0.4;
            animation: backgroundShift 15s ease infinite alternate;
            z-index: 1;
        }

        /* Trendy Neon Border Card */
        .main-card {
            position: relative;
            width: 90%;
            max-width: 360px;
            background: rgba(15, 12, 28, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 40px 25px;
            text-align: center;
            z-index: 10;
            overflow: hidden;
            animation: cardPopIn 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            box-shadow: 0 0 40px rgba(255, 117, 140, 0.1);
        }

        /* Glowing border effect */
        .main-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 30px;
            padding: 2px; /* Border thickness */
            background: linear-gradient(135deg, #ff007f, #7928ca, #00dfd8);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        .profile-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
        }

        .avatar {
            font-size: 4.5rem;
            animation: bounceFloat 3s ease-in-out infinite;
            display: inline-block;
        }

        h1 {
            font-family: 'Caveat', cursive;
            font-size: 3.8rem;
            font-weight: 700;
            background: linear-gradient(to right, #ff007f, #ff758c, #00dfd8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
            transform: rotate(-2deg);
        }

        .name-title {
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: 1px;
            color: #ffffff;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
            margin-bottom: 20px;
        }

        .wish-message {
            font-size: 1rem;
            line-height: 1.7;
            color: #d1cbd6;
            margin-bottom: 35px;
            font-weight: 400;
        }

        /* Neon Interactive Button */
        .magic-btn {
            background: linear-gradient(45deg, #ff007f, #7928ca);
            border: none;
            color: white;
            padding: 16px 32px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.4);
            transition: all 0.3s ease;
            position: relative;
            letter-spacing: 1px;
        }

        .magic-btn:hover {
            box-shadow: 0 0 35px rgba(255, 0, 127, 0.7), 0 0 15px rgba(0, 223, 216, 0.4);
            transform: scale(1.05);
        }

        .magic-btn:active {
            transform: scale(0.95);
        }

        /* Floating Elements (Hearts & Stars) */
        .particle {
            position: absolute;
            bottom: -50px;
            pointer-events: none;
            z-index: 2;
            animation: floatUp linear forwards;
        }

        /* Confetti Burst Elements */
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            pointer-events: none;
            z-index: 20;
            animation: confettiFall linear forwards;
        }

        /* Animations Logic */
        @keyframes backgroundShift {
            0% { transform: scale(1) translate(0, 0); }
            100% { transform: scale(1.1) translate(-5%, -5%); }
        }

        @keyframes cardPopIn {
            0% { opacity: 0; transform: scale(0.8) translateY(30px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        @keyframes bounceFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) scale(0.3) rotate(0deg);
                opacity: 0;
            }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% {
                transform: translateY(-110vh) scale(1.2) rotate(360deg);
                opacity: 0;
            }
        }

        @keyframes confettiFall {
            0% {
                transform: translate(0, 0) cubic-bezier(0.1, 1, 0.1, 1);
                opacity: 1;
            }
            100% {
                transform: translate(var(--x), var(--y)) rotate(var(--r));
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="main-card">
        <div class="profile-wrapper">
            <div class="avatar">👑</div>
        </div>
        <h1>Happy Birthday</h1>
        <div class="name-title">SU NADI WIN</div>
        
        <div class="wish-message">
            <p>Wishing you a year as bright and beautiful as your smile! May your day be filled with endless laughter, pure happiness, and all the love you deserve. Keep shining like the star you are! ✨💖</p>
        </div>

        <button class="magic-btn" onclick="triggerMagic(event)">Tap for Magic ✨</button>
    </div>

    <script>
        // Smoothly ambient rising hearts and stars
        const items = ['❤️', '💖', '✨', '⭐', '🎈'];
        function createAmbientParticle() {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            particle.innerHTML = items[Math.floor(Math.random() * items.length)];
            
            particle.style.left = Math.random() * 100 + 'vw';
            particle.style.animationDuration = Math.random() * 4 + 4 + 's'; 
            particle.style.fontSize = Math.random() * 18 + 14 + 'px';
            particle.style.opacity = Math.random() * 0.5 + 0.3;
            
            document.body.appendChild(particle);
            setTimeout(() => { particle.remove(); }, 8000);
        }
        setInterval(createAmbientParticle, 300);

        // TikTok Style Confetti Blast on Click
        function triggerMagic(e) {
            const colors = ['#ff007f', '#7928ca', '#00dfd8', '#ff758c', '#ffdd53', '#ffffff'];
            const burstCount = 50;
            
            // Get button center coordinates for burst source
            const rect = e.target.getBoundingClientRect();
            const startX = rect.left + rect.width / 2;
            const startY = rect.top + rect.height / 2;

            for (let i = 0; i < burstCount; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                
                // Style creation
                confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.left = startX + 'px';
                confetti.style.top = startY + 'px';
                confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                
                // Randomize explosion direction (Vector calculations)
                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 200 + 100; // Force of blast
                const xDist = Math.cos(angle) * velocity;
                const yDist = Math.sin(angle) * velocity + 150; // Include drop effect
                const rotation = Math.random() * 720 - 360;

                confetti.style.setProperty('--x', `${xDist}px`);
                confetti.style.setProperty('--y', `${yDist}px`);
                confetti.style.setProperty('--r', `${rotation}deg`);
                
                confetti.style.animationDuration = Math.random() * 1 + 1 + 's';

                document.body.appendChild(confetti);
                setTimeout(() => { confetti.remove(); }, 2000);
            }
        }
    </script>
</body>
</html>
