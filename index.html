<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Su Nadi Win! 👑</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Outfit:wght@400;600;800&family=Padauk:wght@400;700&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #06040a;
            font-family: 'Outfit', 'Padauk', sans-serif;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            padding: 20px 0;
        }

        /* Luxury Cinematic Neon Background */
        body::before {
            content: '';
            position: absolute;
            width: 140%;
            height: 140%;
            background: radial-gradient(circle at 20% 20%, rgba(255, 0, 127, 0.3) 0%, transparent 40%),
                        radial-gradient(circle at 80% 80%, rgba(0, 223, 216, 0.25) 0%, transparent 40%),
                        radial-gradient(circle at 50% 50%, rgba(121, 40, 202, 0.3) 0%, transparent 50%);
            opacity: 0.8;
            animation: backgroundAurora 20s linear infinite alternate;
            z-index: 1;
        }

        /* 3D Floating Glassmorphic Container */
        .main-card {
            position: relative;
            width: 90%;
            max-width: 360px;
            background: rgba(18, 14, 32, 0.65);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 32px;
            padding: 40px 24px;
            text-align: center;
            z-index: 10;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6),
                        inset 0 1px 2px rgba(255, 255, 255, 0.2);
            animation: floatingCard 4s ease-in-out infinite, cardEnter 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Multi-Color Glowing Border */
        .main-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 32px;
            padding: 2px;
            background: linear-gradient(135deg, #ff007f, #7928ca, #00dfd8, #ff007f);
            background-size: 300% 300%;
            animation: borderGlow 6s linear infinite;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        /* Premium Profile Area with Glowing Aura */
        .photo-wrapper {
            position: relative;
            width: 140px;
            height: 140px;
            margin: 0 auto 25px auto;
        }

        .birthday-photo {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #ffffff;
            box-shadow: 0 0 25px rgba(255, 0, 127, 0.6), 0 0 50px rgba(0, 223, 216, 0.3);
            animation: photoPulse 3s ease-in-out infinite;
        }

        .crown-icon {
            position: absolute;
            top: -24px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2.2rem;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
            animation: crownBounce 3s ease-in-out infinite;
        }

        /* Luxury Typography */
        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3.4rem;
            font-weight: 700;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
            margin-bottom: 2px;
        }

        /* Animated Shimmer Name */
        .name-title {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(to right, #ff007f 20%, #00dfd8 40%, #7928ca 60%, #ff007f 80%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: nameShimmer 4s linear infinite;
            margin-bottom: 25px;
            text-transform: uppercase;
        }

        /* Romantic Myanmar Text Box */
        .wish-message {
            font-family: 'Padauk', sans-serif;
            font-size: 1.05rem;
            line-height: 1.8;
            color: #eae5f3;
            margin-bottom: 35px;
            background: rgba(255, 255, 255, 0.04);
            padding: 20px 15px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.2);
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }

        .wish-message p {
            margin-bottom: 12px;
        }
        .wish-message p:last-child {
            margin-bottom: 0;
            font-weight: bold;
            font-size: 1.15rem;
            color: #ff409f;
            text-shadow: 0 0 10px rgba(255, 64, 159, 0.4);
        }

        /* TikTok Style Animated Button */
        .magic-btn {
            background: linear-gradient(45deg, #ff007f, #7928ca, #00dfd8);
            background-size: 200% auto;
            border: none;
            color: white;
            padding: 16px 36px;
            font-size: 1.05rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(255, 0, 127, 0.4);
            transition: all 0.3s ease;
            letter-spacing: 1px;
            animation: pulseButton 2s infinite;
        }

        .magic-btn:hover {
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 15px 30px rgba(255, 0, 127, 0.6), 0 0 15px rgba(0, 223, 216, 0.4);
            background-position: right center;
        }

        /* Advanced Particle Engine Styles */
        .particle {
            position: absolute;
            bottom: -50px;
            pointer-events: none;
            z-index: 2;
            animation: floatUp linear forwards;
        }

        .confetti {
            position: absolute;
            width: 8px;
            height: 8px;
            pointer-events: none;
            z-index: 20;
            animation: confettiFall linear forwards;
        }

        /* Core Keyframe Animations */
        @keyframes backgroundAurora {
            0% { transform: scale(1) rotate(0deg); }
            100% { transform: scale(1.1) rotate(10deg); }
        }

        @keyframes cardEnter {
            from { opacity: 0; transform: scale(0.7) translateY(50px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        @keyframes floatingCard {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        @keyframes borderGlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes crownBounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-6px); }
        }

        @keyframes nameShimmer {
            to { background-position: 200% center; }
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.3) rotate(0deg); opacity: 0; }
            15% { opacity: 0.7; }
            85% { opacity: 0.7; }
            100% { transform: translateY(-115vh) scale(1.3) rotate(360deg); opacity: 0; }
        }

        @keyframes confettiFall {
            0% { transform: translate(0, 0) cubic-bezier(0.1, 1, 0.1, 1); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) rotate(var(--r)); opacity: 0; }
        }

        @keyframes pulseButton {
            0% { box-shadow: 0 0 0 0 rgba(255, 0, 127, 0.5); }
            70% { box-shadow: 0 0 0 15px rgba(255, 0, 127, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 0, 127, 0); }
        }
    </style>
</head>
<body>

    <audio id="bg-music" loop>
        <source src="https://assets.mixkit.co/active_storage/sfx/123/123-100.wav" type="audio/wav">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mp3">
    </audio>

    <div class="main-card">
        <div class="photo-wrapper">
            <div class="crown-icon">👑</div>
            <img class="birthday-photo" src="https://i.postimg.cc/tg1C0bpZ/20251116-155722(1).avif" alt="Su Nadi Win">
        </div>

        <h1>Happy Birthday</h1>
        <div class="name-title">SU NADI WIN</div>
        
        <div class="wish-message">
            <p>Teenager life ရဲ့နောက်ဆုံးနှစ်ဖြစ်တဲ့ ၁၉ ကျော်ပီး ၂၀ ပြည့် မွေးနေ့မှာပျော်ရွှင်ပါစေ စုရေ...</p>
            <p>မွေးနေ့ကစပီး စုစုလေးဒီထက်မက ပိုပိုပီးလှလာပါစေ၊ အရာရာတိုင်းမှာ အဆင်ပြေပါစေ၊ ကားဆိုက်ကယ် အန္တရာယ်တွေကနေလဲ ကင်းပါစေ။</p>
            <p>မောင်နဲ့လဲညားပါစေ ❤️</p>
        </div>

        <button class="magic-btn" onclick="playMusicAndBlast(event)">Tap for Magic 🎵✨</button>
    </div>

    <script>
        // Smooth continuous background particles
        const items = ['❤️', '💖', '✨', '⭐', '🎈', '🌸'];
        function createAmbientParticle() {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            particle.innerHTML = items[Math.floor(Math.random() * items.length)];
            particle.style.left = Math.random() * 100 + 'vw';
            particle.style.animationDuration = Math.random() * 4 + 4 + 's'; 
            particle.style.fontSize = Math.random() * 18 + 14 + 'px';
            particle.style.opacity = Math.random() * 0.4 + 0.2;
            document.body.appendChild(particle);
            setTimeout(() => { particle.remove(); }, 8000);
        }
        setInterval(createAmbientParticle, 300);

        // Music Play + Premium Interactive Confetti Burst Logic
        function playMusicAndBlast(e) {
            // Play background music
            const music = document.getElementById('bg-music');
            music.volume = 0.4;
            music.play().catch(error => console.log("Audio playback interaction handler activated"));

            // Confetti Burst Config
            const colors = ['#ff007f', '#7928ca', '#00dfd8', '#ff758c', '#ffdd53', '#ffffff'];
            const burstCount = 60;
            const rect = e.target.getBoundingClientRect();
            const startX = rect.left + rect.width / 2;
            const startY = rect.top + rect.height / 2;

            for (let i = 0; i < burstCount; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                
                // Mix standard squares with romantic big hearts in the burst
                if(Math.random() > 0.75) {
                    confetti.innerHTML = '💖';
                    confetti.style.background = 'none';
                    confetti.style.fontSize = '20px';
                } else {
                    confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                }

                confetti.style.left = startX + 'px';
                confetti.style.top = startY + 'px';
                
                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 240 + 100; // Multi-directional blast force
                const xDist = Math.cos(angle) * velocity;
                const yDist = Math.sin(angle) * velocity + 100; 
                const rotation = Math.random() * 1080 - 540;

                confetti.style.setProperty('--x', `${xDist}px`);
                confetti.style.setProperty('--y', `${yDist}px`);
                confetti.style.setProperty('--r', `${rotation}deg`);
                confetti.style.animationDuration = Math.random() * 1.2 + 0.8 + 's';

                document.body.appendChild(confetti);
                setTimeout(() => { confetti.remove(); }, 2000);
            }
        }
    </script>
</body>
</html>
