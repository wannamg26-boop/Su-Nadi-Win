<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Su Nadi Win! ✨</title>
    
    <!-- Importing smooth, elegant fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(135deg, #0f0c20 0%, #15102a 50%, #241435 100%);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Ambient glowing background decoration */
        .glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255,105,180,0.15) 0%, rgba(0,0,0,0) 70%);
            top: 20%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            pointer-events: none;
        }

        /* Container designed perfectly for mobile viewports */
        .card-container {
            width: 90%;
            max-width: 380px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 35px 25px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            z-index: 10;
            animation: fadeIn 1.5s ease-out;
        }

        .avatar-area {
            font-size: 4rem;
            margin-bottom: 15px;
            animation: float 3s ease-in-out infinite;
            display: inline-block;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 2.8rem;
            background: linear-gradient(45deg, #ff758c 0%, #ff7eb3 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
        }

        .sub-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #ff7eb3;
            font-weight: 600;
            margin-bottom: 25px;
        }

        .message-box {
            font-size: 1.05rem;
            line-height: 1.6;
            color: #e0dbe3;
            margin-bottom: 30px;
        }

        .heart-btn {
            background: linear-gradient(45deg, #ff758c, #ff7eb3);
            border: none;
            color: white;
            padding: 14px 28px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(255, 117, 140, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .heart-btn:active {
            transform: scale(0.95);
        }

        /* Floating Hearts Animation Logic */
        .floating-heart {
            position: absolute;
            bottom: -20px;
            color: #ff758c;
            font-size: 20px;
            pointer-events: none;
            opacity: 0.75;
            z-index: 2;
            animation: rise Up linear forwards;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes riseUp {
            0% {
                transform: translateY(0) scale(0.5) rotate(0deg);
                opacity: 0.8;
            }
            100% {
                transform: translateY(-105vh) scale(1.2) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="glow"></div>

    <div class="card-container">
        <div class="avatar-area">🎉</div>
        <h1>Happy Birthday</h1>
        <div class="sub-title">Su Nadi Win</div>
        
        <div class="message-box">
            <p>Wishing you a wonderful day filled with sweet moments, beautiful smiles, and everything that makes you happiest. May this year bring you closer to all your dreams! ✨💖</p>
        </div>

        <button class="heart-btn" onclick="createHeartBurst()">Tap for Love ❤️</button>
    </div>

    <script>
        // Automatic heart generator (background stream)
        function generateHeart() {
            const heart = document.createElement('div');
            heart.classList.add('floating-heart');
            heart.innerHTML = '❤️';
            
            // Randomize position, size, and speed for a natural feel
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 4 + 's'; // Between 4-7 seconds
            heart.style.fontSize = Math.random() * 15 + 15 + 'px'; // Between 15px-30px
            
            document.body.appendChild(heart);
            
            // Remove from DOM after animation completes to keep it clean
            setTimeout(() => {
                heart.remove();
            }, 7000);
        }

        // Run continuous background hearts
        setInterval(generateHeart, 400);

        // Extra burst of hearts when the button is clicked
        function createHeartBurst() {
            for(let i = 0; i < 12; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.classList.add('floating-heart');
                    // Randomize between different loving emojis
                    const emojis = ['❤️', '💖', '✨', '🌸'];
                    heart.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
                    
                    // Constrain the burst mostly around the center/button area
                    heart.style.left = (Math.random() * 40 + 30) + 'vw';
                    heart.style.animationDuration = Math.random() * 2 + 2 + 's'; 
                    heart.style.fontSize = Math.random() * 20 + 15 + 'px';
                    
                    document.body.appendChild(heart);
                    
                    setTimeout(() => { heart.remove(); }, 4000);
                }, i * 50);
            }
        }
    </script>
</body>
</html>
